            专家分析（知识推理）：基于识别出的菜名，利用你的美食知识储备，补全该菜品的分类、口味和主要食材。\n\nJSON 输出规范（必须严格遵守此结构）：\n\
            [\n  {\n    \"name\": \"图片上的原始菜名\",\n    \"category\": \"分类（肉类/海鲜/蔬菜/主食/汤品）\"\
            ,\n    \"flavors\": [\"口味1\", \"口味2\"],\n    \"ingredients\": [\"主要食材1\"\
            , \"主要食材2\"]\n  }\n]"
        - id: 545df0ab-41f8-412a-8e05-9443b6cc8f0f
